<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- Background circle -->
  <circle cx="100" cy="100" r="95" fill="#1a4a1a" stroke="#4caf50" stroke-width="4"/>
  <!-- Trophy cup body -->
  <path d="M70 55 h60 v50 q0 30 -30 40 q-30 -10 -30 -40 Z"
        fill="#f0c040" stroke="#c9a000" stroke-width="2"/>
  <!-- Trophy stem -->
  <rect x="90" y="145" width="20" height="18" fill="#f0c040" stroke="#c9a000" stroke-width="2"/>
  <!-- Trophy base -->
  <rect x="72" y="163" width="56" height="10" rx="4" fill="#f0c040" stroke="#c9a000" stroke-width="2"/>
  <!-- Trophy handles -->
  <path d="M70 70 q-20 0 -20 20 q0 15 20 15" fill="none" stroke="#f0c040" stroke-width="5" stroke-linecap="round"/>
  <path d="M130 70 q20 0 20 20 q0 15 -20 15" fill="none" stroke="#f0c040" stroke-width="5" stroke-linecap="round"/>
  <!-- Star on trophy -->
  <polygon points="100,68 104,80 116,80 107,88 110,100 100,93 90,100 93,88 84,80 96,80"
           fill="#fff8dc" stroke="#c9a000" stroke-width="1"/>
  <!-- Celebration stars -->
  <text x="30" y="50" font-family="Arial" font-size="20" fill="#f0c040">★</text>
  <text x="155" y="50" font-family="Arial" font-size="20" fill="#f0c040">★</text>
  <text x="18" y="130" font-family="Arial" font-size="14" fill="#4caf50">★</text>
  <text x="168" y="130" font-family="Arial" font-size="14" fill="#4caf50">★</text>
  <!-- Congratulations text -->
  <text x="100" y="195" font-family="Arial, sans-serif" font-size="11" font-weight="bold"
        text-anchor="middle" fill="#4caf50">YOU WIN!</text>
</svg>
