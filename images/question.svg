<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- Background circle -->
  <circle cx="100" cy="100" r="95" fill="#1e3a5f" stroke="#4a90d9" stroke-width="4"/>
  <!-- Question mark -->
  <text x="100" y="135" font-family="Arial, sans-serif" font-size="120" font-weight="bold"
        text-anchor="middle" fill="#4a90d9">?</text>
  <!-- Decorative dots -->
  <circle cx="40" cy="40" r="6" fill="#f0c040" opacity="0.8"/>
  <circle cx="160" cy="40" r="6" fill="#f0c040" opacity="0.8"/>
  <circle cx="40" cy="160" r="6" fill="#f0c040" opacity="0.8"/>
  <circle cx="160" cy="160" r="6" fill="#f0c040" opacity="0.8"/>
  <!-- Number hints -->
  <text x="28" y="115" font-family="Arial, sans-serif" font-size="14" fill="#a0c4e8" opacity="0.7">1</text>
  <text x="168" y="115" font-family="Arial, sans-serif" font-size="14" fill="#a0c4e8" opacity="0.7">100</text>
</svg>
